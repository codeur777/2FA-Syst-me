# Application
spring.application.name=2fasysteme
server.port=8083

# H2 Database (dev)
spring.datasource.url=jdbc:h2:mem:twofadb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# SMTP Gmail — secrets dans application-local.properties (non versionné)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# JWT — secret dans application-local.properties (non versionné)
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# OTP
app.otp.expiration-minutes=10
app.otp.length=6

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Charger le profil local s'il existe
spring.profiles.active=local
